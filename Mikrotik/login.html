<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Página de Login Hotspot">
    <meta name="author" content="RedesLinkin">
    
    <title>Login Hotspot</title>
    
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/signin.css" rel="stylesheet">
</head>

<body class="text-center">
    
    <div class="content">
        <form id="form" method="post" action="https://hotspot.redeslinkin.com.br/login.php">
            <div>
                <img class="mb-4" src="logo-cor.png" alt="Logo da Empresa" height="150">
                <h1 class="h3 mb-3 font-weight-normal">Favor realizar o cadastro</h1>
            </div>
            
            <div class="form-group">
                <input name="inputCpf" type="text" id="inputCpf" class="form-control" placeholder="CPF" required autofocus>
            </div>
            <div class="form-group">
                <input name="inputNome" type="text" id="inputNome" class="form-control" placeholder="Nome Completo" required>
            </div>
            <div class="form-group">
                <input name="inputSobrenome" type="text" id="inputSobrenome" class="form-control" placeholder="Sobrenome" required>
            </div>
            <div class="form-group">
                <input name="inputTelefone" type="text" id="inputTelefone" class="form-control" placeholder="Celular com DDD" required>
            </div>
            <div class="form-group">
                <input name="inputEmail" type="email" id="inputEmail" class="form-control" placeholder="E-mail" required>
            </div>
            
            <button class="btn btn-lg btn-primary btn-block" type="submit">Acessar Internet</button>
            
            <p class="mt-3"><a href="#" onclick="toggleLoginForm()">Já tem cadastro? Faça o login</a></p>
            
            <input type="hidden" name="mac" value="$(mac)">
            <input type="hidden" name="mac-esc" value="$(mac-esc)">
            <input type="hidden" name="ip" value="$(ip)">
            <input type="hidden" name="username" value="$(username)">
            <input type="hidden" name="link-login" value="$(link-login)">
            <input type="hidden" name="link-orig" value="$(link-orig)">
            <input type="hidden" name="link-login-only" value="$(link-login-only)">
            <input type="hidden" name="error" value="$(error)">
        </form>

        <div id="divlogin" style="display: none;">
            <form id="loginForm" role="form" action="$(link-login-only)" method="post">
                <input type="hidden" name="dst" value="$(link-orig)">
                <input type="hidden" name="popup" value="true">
                
                <h1 class="h3 mb-3 font-weight-normal">Login</h1>
                
                <div class="form-group">
                    <input type="text" class="form-control input-lg" name="username" placeholder="Usuário" required autofocus>
                </div>
                <div class="form-group">
                    <input type="password" class="form-control input-lg" id="inputPassword" name="password" placeholder="Senha" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block btn-lg">Entrar</button>

                $(if error)
                    <div class="alert alert-danger mt-3">$(error)</div>
                $(endif)
            </form>
        </div>
    </div>

    <script type="text/javascript" src="js/jquery.min.js"></script>
    <script type="text/javascript" src="js/jquery.mask.min.js"></script>
    <script type="text/javascript" src="js/bootstrap.min.js"></script>
    <script src="js/bootstrap-validate.js"></script>

    $(if chap-id)
    <script type="text/javascript" src="js/md5.js"></script>
    <script type="text/javascript">
        // CORREÇÃO: Usando o $ padrão do jQuery, que já foi carregado.
        $('#loginForm').submit(function () {
            var password = $('#inputPassword');
            password.val(hexMD5('$(chap-id)' + password.val() + '$(chap-challenge)'));
        });
    </script>
    $(endif)

    <script type="text/javascript">
        // CORREÇÃO: Usando o $ padrão do jQuery, sem necessidade de noConflict()
        $(document).ready(function(){
            // CORREÇÃO: Máscara atualizada para aceitar celulares com 9 dígitos.
            $('#inputCpf').mask('000.000.000-00');
            $('#inputTelefone').mask('(00) 00000-0000');
        });

        function toggleLoginForm() {
            $('#form').toggle(); // Esconde/mostra o formulário de cadastro
            $('#divlogin').toggle(); // Esconde/mostra o formulário de login
        }

        // Validações com bootstrap-validate
        bootstrapValidate('#inputCpf', 'min:14:O CPF deve estar completo!');
        bootstrapValidate('#inputTelefone', 'min:15:O celular deve estar completo!');
        bootstrapValidate(['#inputSobrenome','#inputNome'], 'min:3:Mínimo de 3 caracteres|alpha:Deve conter apenas letras');
        bootstrapValidate('#inputEmail', 'email:Digite um e-mail válido!');
    </script>

</body>
</html>
