<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <title>Login Realizado</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #10b981;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .success-card {
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            max-width: 420px;
            width: 100%;
            text-align: center;
            overflow: hidden;
        }

        .success-top {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
            padding: 40px 25px;
        }

        .success-top .icon-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            animation: scaleIn 0.5s ease;
        }

        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        .success-top .icon-circle i { font-size: 40px; }
        .success-top h2 { font-size: 24px; font-weight: 700; }
        .success-top p { font-size: 14px; opacity: 0.9; margin-top: 5px; }

        .success-body { padding: 25px; }

        .success-body p {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 30px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            margin: 5px;
        }

        .btn-outline {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(102,126,234,0.4); }

        .countdown {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="success-top">
            <div class="icon-circle">
                <i class="fas fa-check"></i>
            </div>
            <h2>Conectado com Sucesso!</h2>
            <p>Você já pode navegar livremente</p>
        </div>

        <div class="success-body">
            <p>Sua conexão foi estabelecida. Clique abaixo para ver o status ou continue navegando.</p>

            <a href="$(link-status)" class="btn">
                <i class="fas fa-chart-bar"></i>
                Ver Status
            </a>
            <a href="http://www.google.com.br" class="btn btn-outline">
                <i class="fas fa-globe"></i>
                Ir para Google
            </a>

            <div class="countdown">
                Redirecionando automaticamente em <span id="countdown">5</span> segundos...
            </div>
        </div>
    </div>

    <script type="text/javascript">
        var seconds = 5;
        var countdownEl = document.getElementById('countdown');
        var interval = setInterval(function() {
            seconds--;
            countdownEl.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(interval);
                window.location.href = 'http://www.google.com.br';
            }
        }, 1000);
    </script>
</body>
</html>
