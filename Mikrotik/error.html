<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <title>Erro - Hotspot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .error-card {
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            max-width: 420px;
            width: 100%;
            text-align: center;
            overflow: hidden;
        }

        .error-top {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            padding: 35px 25px;
        }

        .error-top .icon-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .error-top .icon-circle i { font-size: 32px; }
        .error-top h2 { font-size: 22px; font-weight: 700; }
        .error-top p { font-size: 14px; opacity: 0.9; margin-top: 5px; }

        .error-body { padding: 25px; }

        .error-detail {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            color: #991b1b;
            font-size: 14px;
        }

        .error-detail code {
            display: block;
            margin-top: 8px;
            font-size: 12px;
            background: rgba(0,0,0,0.05);
            padding: 8px;
            border-radius: 6px;
            word-break: break-all;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 30px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            margin: 5px;
        }

        .btn-outline {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(102,126,234,0.4); }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-top">
            <div class="icon-circle">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h2>Ops! Algo deu errado</h2>
            <p>Não foi possível completar a conexão</p>
        </div>

        <div class="error-body">
            <div class="error-detail">
                <i class="fas fa-bug"></i> <strong>Erro:</strong> $(error)
                <code>$(link-login)</code>
            </div>

            <a href="$(link-login)" class="btn">
                <i class="fas fa-redo"></i>
                Tentar Novamente
            </a>
            <a href="http://www.google.com" class="btn btn-outline">
                <i class="fas fa-home"></i>
                Ir para Google
            </a>
        </div>
    </div>
</body>
</html>
