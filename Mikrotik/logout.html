<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <title>Desconectado</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --text-dark: #1a1a2e;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .logout-card {
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            max-width: 450px;
            width: 100%;
            overflow: hidden;
            text-align: center;
        }

        .logout-header {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            color: white;
            padding: 30px 25px;
        }

        .logout-header .icon-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .logout-header .icon-circle i { font-size: 32px; }
        .logout-header h2 { font-size: 22px; font-weight: 700; }
        .logout-header p { font-size: 14px; opacity: 0.9; margin-top: 5px; }

        $(if error)
        .alert-danger {
            margin: 15px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        $(endif)

        .logout-body { padding: 25px; }

        .session-info {
            background: #f9fafb;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .session-info h4 {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-grid {
            display: grid;
            gap: 10px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .info-item:last-child { border: none; }

        .info-item .label {
            font-size: 13px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-item .label i { color: var(--primary); width: 16px; }

        .info-item .value {
            font-weight: 600;
            color: var(--text-dark);
            font-size: 13px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 30px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(102,126,234,0.4); }
    </style>
</head>
<body>
    <div class="logout-card">
        <div class="logout-header">
            <div class="icon-circle">
                <i class="fas fa-sign-out-alt"></i>
            </div>
            <h2>Desconectado</h2>
            <p>Você foi desconectado da rede</p>
        </div>

        $(if error)
        <div class="alert-danger">
            <i class="fas fa-exclamation-triangle"></i>
            $(error)
        </div>
        $(endif)

        <div class="logout-body">
            <div class="session-info">
                <h4>Resumo da Sessão</h4>
                <div class="info-grid">
                    <div class="info-item">
                        <span class="label"><i class="fas fa-user"></i> Usuário</span>
                        <span class="value">$(username)</span>
                    </div>
                    <div class="info-item">
                        <span class="label"><i class="fas fa-network-wired"></i> IP</span>
                        <span class="value">$(ip)</span>
                    </div>
                    <div class="info-item">
                        <span class="label"><i class="fas fa-laptop"></i> MAC</span>
                        <span class="value">$(mac)</span>
                    </div>
                    <div class="info-item">
                        <span class="label"><i class="fas fa-clock"></i> Tempo</span>
                        <span class="value">$(uptime)</span>
                    </div>
                    $(if session-time-left)
                    <div class="info-item">
                        <span class="label"><i class="fas fa-hourglass-half"></i> Restante</span>
                        <span class="value">$(session-time-left)</span>
                    </div>
                    $(endif)
                    <div class="info-item">
                        <span class="label"><i class="fas fa-exchange-alt"></i> Dados</span>
                        <span class="value">$(bytes-in-nice) / $(bytes-out-nice)</span>
                    </div>
                </div>
            </div>

            <a href="$(link-login)" class="btn">
                <i class="fas fa-sign-in-alt"></i>
                Conectar Novamente
            </a>
        </div>
    </div>
</body>
</html>
